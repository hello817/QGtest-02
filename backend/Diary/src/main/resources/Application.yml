spring:
  datasource:
    url:  jdbc:mysql://localhost:3306/DiarySystem?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper_locations: classpath:mapper/*.xml
  type-aliases-package: com.qgtest.diary.entity

server:
  port: 8801

jwt:
  secret: ${SECRET_KEY}
  expiration: 86400000  # 有效时间24小时，这里是用单位毫秒表示