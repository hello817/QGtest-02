spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aidiarysys?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  ai:
    openai:
      api-key: ${API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.qgtest.diary.entity

server:
  port: 8801
  base_url: http://localhost:8801

upload:
  path: D:/code/JavaCode/QGtest02/backend/Diary/uploads/avatars/

jwt:
  secret: ${SECRET_KEY}
  expiration: 86400000
